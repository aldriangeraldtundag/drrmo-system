{% extends 'drrmo/base.html' %}
{% block title %}Login | Silay City DRRMO{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 2rem auto;">
    <h2>Staff login</h2>
    <p class="help-text">Enter your credentials to open the DRRMO CDRA system. Account creation is managed by the administrator.</p>
    <form method="post">
        {% csrf_token %}
        <div class="field">
            <label for="id_username">Username</label>
            {{ form.username }}
        </div>
        <div class="field">
            <label for="id_password">Password</label>
            {{ form.password }}
        </div>
        <button class="button" type="submit">Log in</button>
    </form>
</div>
{% endblock %}
